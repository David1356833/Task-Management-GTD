<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task-Management GTD</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #dbeafe, #ecfdf5);
  color: #1e293b;
}

.dark {
  background: #020617;
  color: #e2e8f0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: #0077cc;
  color: white;
}

/* BUTTONS */
button {
  padding: 7px 12px;
  background: #00cc88;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 150px;
  overflow-x: auto;
  height: 80vh;
  padding: 10px;
}

/* COLUMN */
.column { margin-right: 10px; }

/* HEADER DAY */
.day-header {
  font-size: 13px;
  background: #b3e6ff;
  border-radius: 10px;
  text-align: center;
  padding: 8px;
  font-weight: bold;
  margin-bottom: 10px;
}

/* TASK */
.task {
  background: white;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.task.low { border-left: 5px solid green; }
.task.medium { border-left: 5px solid blue; }
.task.high { border-left: 5px solid orange; }
.task.urgent { border-left: 5px solid red; }

/* MODALS */
.modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  display: none;
  width: 350px;
  border-radius: 12px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.modal textarea, .modal input, .modal select {
  width: 100%;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="header">
  <div>
    <button onclick="changeMonth(-1)">⬅</button>
    <span id="monthText"></span>
    <button onclick="changeMonth(1)">➡</button>
  </div>
  <div>
    <button onclick="openCreateModal()">+ Task</button>
    <button onclick="toggleTheme()">Theme</button>
  </div>
</div>

<div id="grid" class="grid"></div>

<!-- CREATE MODAL -->
<div class="modal" id="createModal">
  <h3>New Task</h3>
  <input id="taskName" placeholder="Task name">
  <input id="project" placeholder="Project">

  <select id="priority">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
    <option>Urgent</option>
  </select>

  <select id="status">
    <option>To Do</option>
    <option>In Progress</option>
  </select>

  <input type="date" id="date">
  <textarea id="notes" maxlength="3000" placeholder="Notes"></textarea>
  <textarea id="subtasks" placeholder="Subtasks"></textarea>

  <button onclick="addTask()">Save</button>
  <button onclick="closeCreate()">Cancel</button>
</div>

<!-- EDIT MODAL -->
<div class="modal" id="editModal">
  <h3>Edit Task</h3>

  <input id="editName">
  <input id="editProject">
  <select id="editPriority">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
    <option>Urgent</option>
  </select>

  <select id="editStatus">
    <option>To Do</option>
    <option>In Progress</option>
  </select>

  <textarea id="editNotes"></textarea>
  <textarea id="editSubtasks"></textarea>

  <button onclick="saveEdit()">Save Changes</button>
  <button onclick="deleteTask()">Delete</button>
  <button onclick="closeEdit()">Cancel</button>
</div>

<script>
let current = new Date();
let data = JSON.parse(localStorage.getItem("tasks") || "{}");

let selectedTask = null;
let selectedDay = null;
let selectedIndex = null;

function save() {
  localStorage.setItem("tasks", JSON.stringify(data));
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  let year = current.getFullYear();
  let month = current.getMonth();
  let days = new Date(year, month + 1, 0).getDate();

  monthText.textContent =
    current.toLocaleString('default', { month: 'long', year: 'numeric' });

  for (let d = 1; d <= days; d++) {
    let col = document.createElement("div");
    col.className = "column";

    let date = new Date(year, month, d);

    let header = document.createElement("div");
    header.className = "day-header";
    header.innerText =
      date.toLocaleDateString(undefined, { weekday:'short', day:'numeric' });

    col.appendChild(header);

    (data[d] || []).forEach((t, i) => {
      let div = document.createElement("div");
      div.className = "task " + t.priority.toLowerCase();

      div.innerHTML = `
        <b>${t.name}</b><br>
        ${t.project || ""}<br>
        ${t.status}
      `;

      /* CLICK TO EDIT */
      div.onclick = () => openEdit(t, d, i);

      /* DRAG */
      div.draggable = true;
      div.ondragstart = e => {
        e.dataTransfer.setData("text", JSON.stringify({day:d,index:i}));
      };

      col.appendChild(div);
    });

    col.ondragover = e => e.preventDefault();
    col.ondrop = e => dropTask(e, d);

    grid.appendChild(col);
  }
}

function dropTask(e, newDay) {
  let { day, index } = JSON.parse(e.dataTransfer.getData("text"));

  let [task] = data[day].splice(index, 1);

  data[newDay] = data[newDay] || [];
  data[newDay].push(task);

  save();
  render();
}

/* CREATE */
function openCreateModal() {
  createModal.style.display = "block";
}
function closeCreate() {
  createModal.style.display = "none";
}

function addTask() {
  let d = new Date(date.value).getDate();
  if (!d) return alert("Choose a date");

  let t = {
    name: taskName.value,
    project: project.value,
    priority: priority.value,
    status: status.value,
    notes: notes.value,
    subtasks: subtasks.value
  };

  data[d] = data[d] || [];
  data[d].push(t);

  save();
  closeCreate();
  render();
}

/* EDIT */
function openEdit(t, day, index) {
  selectedTask = t;
  selectedDay = day;
  selectedIndex = index;

  editName.value = t.name;
  editProject.value = t.project;
  editPriority.value = t.priority;
  editStatus.value = t.status;
  editNotes.value = t.notes;
  editSubtasks.value = t.subtasks;

  editModal.style.display = "block";
}

function closeEdit() {
  editModal.style.display = "none";
}

function saveEdit() {
  let t = data[selectedDay][selectedIndex];

  t.name = editName.value;
  t.project = editProject.value;
  t.priority = editPriority.value;
  t.status = editStatus.value;
  t.notes = editNotes.value;
  t.subtasks = editSubtasks.value;

  save();
  closeEdit();
  render();
}

function deleteTask() {
  if(confirm("Delete task?")) {
    data[selectedDay].splice(selectedIndex,1);
    save();
    closeEdit();
    render();
  }
}

/* OTHER */
function changeMonth(n) {
  current.setMonth(current.getMonth() + n);
  render();
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}

render();
</script>

</body>
</html>
