<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task-Management GTD</title>
<style>
body {
  font-family: Arial;
  margin: 0;
  background: #e6f2ff;
}
.dark { background: #0f172a; color: #e2e8f0; }

.header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #0077cc;
  color: white;
}

button {
  padding: 6px 10px;
  background: #00cc88;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 120px;
  overflow-x: auto;
  height: 80vh;
}

.column {
  border-right: 1px solid #ccc;
  padding: 5px;
}

.day-header {
  font-size: 12px;
  background: #b3e6ff;
  text-align: center;
  padding: 5px;
  position: sticky;
  top: 0;
}

.task {
  background: white;
  margin: 5px 0;
  padding: 5px;
  border-radius: 5px;
  cursor: grab;
  font-size: 12px;
}

.task.low { border-left: 5px solid green; }
.task.medium { border-left: 5px solid blue; }
.task.high { border-left: 5px solid orange; }
.task.urgent { border-left: 5px solid red; }

.dark .task { background: #1e293b; }

.modal {
  position: fixed;
  top: 15%;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  padding: 15px;
  display: none;
  width: 320px;
  border-radius: 10px;
}

.modal input, .modal textarea, .modal select {
  width: 100%;
  margin-bottom: 5px;
  padding: 5px;
}
</style>
</head>

<body>

<div class="header">
  <div>
    <button onclick="changeMonth(-1)">⬅</button>
    <span id="monthText"></span>
    <button onclick="changeMonth(1)">➡</button>
  </div>
  <div>
    <button onclick="openModal()">+ Task</button>
    <button onclick="toggleTheme()">Theme</button>
  </div>
</div>

<div id="grid" class="grid"></div>

<div class="modal" id="modal">
  <h3>New Task</h3>
  <input id="taskName" placeholder="Task name" required>
  <input id="project" placeholder="Project">
  <select id="priority">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
    <option>Urgent</option>
  </select>
  <select id="status">
    <option>To Do</option>
    <option>In Progress</option>
  </select>
  <input type="date" id="date">
  <textarea id="notes" maxlength="3000" placeholder="Notes (max 3000)"></textarea>
  <textarea id="subtasks" placeholder="Subtasks (one per line)"></textarea>
  <button onclick="addTask()">Save</button>
  <button onclick="closeModal()">Cancel</button>
</div>

<script>
let current = new Date();
let data = JSON.parse(localStorage.getItem("tasks") || "{}");

function save() {
  localStorage.setItem("tasks", JSON.stringify(data));
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  let year = current.getFullYear();
  let month = current.getMonth();
  let days = new Date(year, month+1, 0).getDate();

  document.getElementById("monthText").textContent =
    current.toLocaleString('default', { month: 'long', year: 'numeric' });

  for (let d = 1; d <= days; d++) {
    let col = document.createElement("div");
    col.className = "column";
    col.dataset.day = d;

    let date = new Date(year, month, d);
    let header = document.createElement("div");
    header.className = "day-header";
    header.innerText = date.toLocaleDateString(undefined, { weekday:'short', day:'numeric' });

    col.appendChild(header);

    let tasks = data[d] || [];
    tasks.forEach(t => col.appendChild(renderTask(t, d)));

    col.ondragover = e => e.preventDefault();
    col.ondrop = e => dropTask(e, d);

    grid.appendChild(col);
  }

  let next = document.createElement("div");
  next.className = "column";
  next.innerHTML = "<div class='day-header'>Next Month</div>";
  let tasks = data["next"] || [];
  tasks.forEach(t => next.appendChild(renderTask(t, "next")));
  next.ondragover = e => e.preventDefault();
  next.ondrop = e => dropTask(e, "next");

  grid.appendChild(next);
}

function renderTask(t, day) {
  let div = document.createElement("div");
  div.className = "task " + t.priority.toLowerCase();
  div.draggable = true;

  div.innerHTML = `<b>${t.name}</b><br>${t.project || ""}<br>${t.status}`;

  div.ondragstart = e => {
    e.dataTransfer.setData("text", JSON.stringify({t, day}));
  };

  div.onclick = () => {
    if(confirm("Delete task?")) {
      data[day] = data[day].filter(x => x !== t);
      save(); render();
    }
  };

  return div;
}

function dropTask(e, newDay) {
  let {t, day} = JSON.parse(e.dataTransfer.getData("text"));

  data[day] = data[day].filter(x => x !== t);
  data[newDay] = data[newDay] || [];
  data[newDay].push(t);

  save();
  render();
}

function addTask() {
  let dateVal = document.getElementById("date").value;
  if (!dateVal) return alert("Select a date");

  let day = new Date(dateVal).getDate();

  let t = {
    name: taskName.value,
    project: project.value,
    priority: priority.value,
    status: status.value,
    notes: notes.value,
    subtasks: subtasks.value
  };

  data[day] = data[day] || [];
  data[day].push(t);

  save();
  closeModal();
  render();
}

function openModal() {
  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function changeMonth(n) {
  current.setMonth(current.getMonth()+n);

  if(n === 1 && data["next"]) {
    data["next"].forEach(t => {
      let d = 1;
      data[d] = data[d] || [];
      data[d].push(t);
    });
    data["next"] = [];
    save();
  }

  render();
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}

render();
</script>

</body>
</html>
