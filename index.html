<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Task-Management GTD</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #dbeafe, #ecfdf5);
  color: #1e293b;
}

.dark {
  background: #020617;
  color: #e2e8f0;
}

.header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: #0077cc;
  color: white;
}

button {
  padding: 7px 12px;
  background: #00cc88;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 150px;
  overflow-x: auto;
  height: 80vh;
  padding: 10px;
}

.column {
  margin-right: 10px;
}

.day-header {
  font-size: 13px;
  background: #b3e6ff;
  border-radius: 10px;
  text-align: center;
  padding: 8px;
  font-weight: bold;
  margin-bottom: 10px;
}

.task {
  background: white;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 12px;
  font-size: 12px;
  cursor: grab;
}

.task.low { border-left: 5px solid green; }
.task.medium { border-left: 5px solid blue; }
.task.high { border-left: 5px solid orange; }
.task.urgent { border-left: 5px solid red; }

.modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  display: none;
  width: 320px;
  border-radius: 10px;
}

.modal input, .modal textarea, .modal select {
  width: 100%;
  margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="header">
  <div>
    <button onclick="changeMonth(-1)">⬅</button>
    <span id="monthText"></span>
    <button onclick="changeMonth(1)">➡</button>
  </div>

  <div>
    <button onclick="openModal()">+ Task</button>
    <button onclick="toggleTheme()">Theme</button>
  </div>
</div>

<div id="grid" class="grid"></div>

<div class="modal" id="modal">
  <h3>New Task</h3>

  <input id="taskName" placeholder="Task name">
  <input id="project" placeholder="Project">

  <select id="priority">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
    <option>Urgent</option>
  </select>

  <select id="status">
    <option>To Do</option>
    <option>In Progress</option>
  </select>

  <input type="date" id="date">

  <textarea id="notes" maxlength="3000" placeholder="Notes"></textarea>
  <textarea id="subtasks" placeholder="Subtasks"></textarea>

  <button onclick="addTask()">Save</button>
  <button onclick="closeModal()">Cancel</button>
</div>

<script>
let current = new Date();
let data = JSON.parse(localStorage.getItem("tasks") || "{}");

function save() {
  localStorage.setItem("tasks", JSON.stringify(data));
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  let year = current.getFullYear();
  let month = current.getMonth();
  let days = new Date(year, month + 1, 0).getDate();

  document.getElementById("monthText").textContent =
    current.toLocaleString('default', { month: 'long', year: 'numeric' });

  for (let d = 1; d <= days; d++) {
    let col = document.createElement("div");
    col.className = "column";

    let date = new Date(year, month, d);

    let header = document.createElement("div");
    header.className = "day-header";
    header.innerText =
      date.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric' });

    col.appendChild(header);

    let tasks = data[d] || [];
    tasks.forEach((t, i) => col.appendChild(renderTask(t, d, i)));

    col.ondragover = e => e.preventDefault();
    col.ondrop = e => dropTask(e, d);

    grid.appendChild(col);
  }

  let next = document.createElement("div");
  next.className = "column";
  next.innerHTML = "<div class='day-header'>Next Month</div>";

  (data["next"] || []).forEach((t,i) => next.appendChild(renderTask(t, "next", i)));

  next.ondragover = e => e.preventDefault();
  next.ondrop = e => dropTask(e, "next");

  grid.appendChild(next);
}

function renderTask(t, day, index) {
  let div = document.createElement("div");
  div.className = "task " + t.priority.toLowerCase();
  div.draggable = true;

  div.innerHTML = `
    <b>${t.name}</b><br>
    ${t.project || ""}<br>
    ${t.status} | ${t.priority}
  `;

  div.ondragstart = e => {
    e.dataTransfer.setData("text", JSON.stringify({day, index}));
  };

  div.onclick = () => {
    if (confirm("Delete task?")) {
      data[day].splice(index, 1);
      save();
      render();
    }
  };

  return div;
}

function dropTask(e, newDay) {
  let { day, index } = JSON.parse(e.dataTransfer.getData("text"));

  let [task] = data[day].splice(index, 1);

  data[newDay] = data[newDay] || [];
  data[newDay].push(task);

  save();
  render();
}

function addTask() {
  let dateVal = date.value;
  if (!dateVal) return alert("Choose a date");

  let day = new Date(dateVal).getDate();

  let t = {
    name: taskName.value,
    project: project.value,
    priority: priority.value,
    status: status.value
  };

  data[day] = data[day] || [];
  data[day].push(t);

  save();
  closeModal();
  render();
}

function openModal() {
  modal.style.display = "block";
}

function closeModal() {
  modal.style.display = "none";
}

function changeMonth(n) {
  current.setMonth(current.getMonth() + n);
  render();
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}

render();
</script>

</body>
</html>
